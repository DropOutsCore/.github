<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0917"/>
      <stop offset="100%" stop-color="#0F0E1F"/>
    </linearGradient>
    <linearGradient id="screenGlow1" x1="0%" y1="0%" x2="0%" y2="100%">
