  <text x="120" y="188" font-family="'Courier New', monospace" font-size="10.5" fill="#534AB7">= </text>
  <text x="132" y="188" font-family="'Courier New', monospace" font-size="10.5" fill="#5DCAA5">model.run</text>
  <text x="186" y="188" font-family="'Courier New', monospace" font-size="10.5" fill="#AFA9EC">(data)</text>

